<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .panel { fill: #f9fafb; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: bold 18px Arial, sans-serif; fill: #111827; }
      .text { font: 14px Arial, sans-serif; fill: #374151; }
      .small { font: 12px Arial, sans-serif; fill: #6b7280; }
      .label { font: 12px Arial, sans-serif; fill: #111827; }
      .chip { fill: #e5e7eb; stroke: #d1d5db; }
      .chip-text { font: 12px Arial, sans-serif; fill: #111827; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>

  <!-- Left Panel: Pedidos (SO) -->
  <rect class="panel" x="24" y="24" width="360" height="672" rx="12"/>
  <text class="title" x="48" y="56">Pedidos (SO)</text>
  <!-- List items -->
  <text class="text" x="48" y="92">SO 000123 · Cliente A · $ 2.350.000</text>
  <text class="text" x="48" y="120">SO 000124 · Cliente B · $   450.000</text>
  <text class="text" x="48" y="148">SO 000125 · Cliente C · $   980.000</text>
  <text class="small" x="48" y="182">Tip: usa búsqueda por código o cliente</text>

  <!-- Center Panel: Ítems del Pedido -->
  <rect class="panel" x="408" y="24" width="504" height="672" rx="12"/>
  <text class="title" x="432" y="56">Ítems del Pedido</text>

  <!-- Table header -->
  <text class="label" x="432" y="92">Producto</text>
  <text class="label" x="612" y="92">Dem./Unidad</text>
  <text class="label" x="756" y="92">Asignado</text>
  <text class="label" x="930" y="92">Acciones</text>

  <!-- Row 1 -->
  <text class="text" x="432" y="120">Tomate</text>
  <text class="text" x="612" y="120">40 kg</text>
  <!-- Assignment bar -->
  <rect x="756" y="104" width="160" height="16" fill="#e5e7eb" rx="8"/>
  <rect x="756" y="104" width="120" height="16" fill="#93c5fd" rx="8"/>
  <rect x="876" y="104" width="40" height="16" fill="#fca5a5" rx="8"/>
  <text class="small" x="756" y="140">El Campesino: 30 kg · Bazurto: 10 kg</text>
  <!-- Prices -->
  <text class="small" x="432" y="140">Ref: $ 4.200/kg · Mejor: $ 4.200/kg</text>
  <text class="small" x="432" y="160">Provs disp.: El Campesino, Plaza Bazurto</text>
  <!-- Actions -->
  <rect class="chip" x="930" y="110" width="120" height="26" rx="6"/>
  <text class="chip-text" x="940" y="128">+ Agregar proveedor</text>

  <!-- Inline editor options -->
  <rect class="chip" x="432" y="182" width="190" height="26" rx="6"/>
  <text class="chip-text" x="442" y="200">El Campesino · $ 4.200/kg</text>
  <rect class="chip" x="432" y="214" width="190" height="26" rx="6"/>
  <text class="chip-text" x="442" y="232">Plaza Bazurto · $ 4.300/kg</text>
  <text class="small" x="432" y="260">Cantidades</text>
  <rect class="panel" x="500" y="246" width="64" height="28" rx="6"/>
  <text class="text" x="524" y="266" text-anchor="middle">30</text>
  <text class="small" x="576" y="264">Subtotal: $ 126.000</text>
  <rect class="panel" x="734" y="246" width="64" height="28" rx="6"/>
  <text class="text" x="758" y="266" text-anchor="middle">10</text>
  <text class="small" x="810" y="264">Subtotal: $ 43.000</text>

  <!-- Row 2 -->
  <text class="text" x="432" y="314">Zanahoria</text>
  <text class="text" x="612" y="314">25 kg</text>
  <rect x="756" y="298" width="160" height="16" fill="#e5e7eb" rx="8"/>
  <rect x="756" y="298" width="100" height="16" fill="#93c5fd" rx="8"/>
  <text class="small" x="756" y="334">El Campesino: 25 kg</text>
  <text class="small" x="432" y="334">Ref: $ 2.000/kg · Mejor: $ 2.000/kg</text>
  <text class="small" x="432" y="354">Provs disp.: El Campesino</text>

  <!-- Validation hints -->
  <text class="small" x="432" y="392">Validaciones: no exceder demanda, cantidades no negativas, avisos por precio.</text>
  <text class="small" x="432" y="412">Atajos: sugerir asignación óptima (costo mínimo), rebalancear por cambios.</text>

  <!-- Right Panel: Resumen Proveedores -->
  <rect class="panel" x="936" y="24" width="240" height="672" rx="12"/>
  <text class="title" x="960" y="56">Resumen Proveedores</text>

  <!-- Provider 1 -->
  <text class="text" x="960" y="92">El Campesino</text>
  <text class="small" x="960" y="112">Asignado: 65 kg (3 ítems)</text>
  <text class="small" x="960" y="132">Costo total: $ 260.000</text>
  <text class="small" x="960" y="152">Pedidos: SO 000123, 125</text>

  <!-- Divider -->
  <line x1="960" y1="168" x2="1156" y2="168" stroke="#e5e7eb" stroke-width="2"/>

  <!-- Provider 2 -->
  <text class="text" x="960" y="192">Plaza Bazurto</text>
  <text class="small" x="960" y="212">Asignado: 40 kg (2 ítems)</text>
  <text class="small" x="960" y="232">Costo total: $ 172.000</text>
  <text class="small" x="960" y="252">Pedidos: SO 000124</text>

  <!-- Totals -->
  <line x1="960" y1="288" x2="1156" y2="288" stroke="#e5e7eb" stroke-width="2"/>
  <text class="text" x="960" y="312">Totales del plan (hoy)</text>
  <text class="small" x="960" y="332">Demandado: 120 kg</text>
  <text class="small" x="960" y="352">Asignado: 105 kg</text>
  <text class="small" x="960" y="372">Diferencia: 15 kg</text>

  <!-- Legend -->
  <rect x="432" y="456" width="260" height="90" rx="8" class="panel"/>
  <text class="label" x="444" y="478">Leyenda</text>
  <rect x="444" y="492" width="16" height="16" fill="#93c5fd" rx="4"/>
  <text class="small" x="468" y="504">Cantidad asignada a proveedor A</text>
  <rect x="444" y="512" width="16" height="16" fill="#fca5a5" rx="4"/>
  <text class="small" x="468" y="524">Cantidad asignada a proveedor B</text>
</svg>